{% extends "base.html" %}

{% block title %}Delete Job{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white fw-bold">Confirm Delete</div>
      <div class="card-body">
        <p class="fs-5">Are you sure you want to delete this job application?</p>
        <p class="text-muted">
          <strong>{{ object.company }}</strong> — {{ object.title }}
        </p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a class="btn btn-outline-secondary" href="{% url 'job_list' %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
